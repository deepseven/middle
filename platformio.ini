[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_unflags =
    -DARDUINO_USB_MODE=1

build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1

; Use LittleFS for on-device flash storage.
board_build.filesystem = littlefs

; Allocate more flash to LittleFS for recording storage (~3MB).
board_build.partitions = huge_app.csv

[env:xiao_esp32s3_sense]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_XIAO_SENSE=1

board_build.filesystem = littlefs
board_build.partitions = huge_app.csv

lib_deps =
    olikraus/U8g2

[env:m5stick_c_plus2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = pico32
framework = arduino
monitor_speed = 115200

build_flags =
    -DBOARD_M5STICKCPLUS2=1
    ; TFT_eSPI configuration for ST7789V2 135x240 display.
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_MOSI=15
    -DTFT_SCLK=13
    -DTFT_CS=5
    -DTFT_DC=14
    -DTFT_RST=12
    -DTFT_BL=27
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DSPI_FREQUENCY=40000000

board_build.filesystem = littlefs
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI
